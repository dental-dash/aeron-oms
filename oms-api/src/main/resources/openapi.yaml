openapi: "3.0.3"
info:
  title: Aeron OMS — Query API
  description: |
    Read-only query interface served by `OrderQueryServer` on port 8081.

    **Price & Quantity:** stored internally as fixed-point × 10^8; returned as doubles (e.g. `150.25`).

    **WebSocket:** `ws://localhost:8081/ws/orders`
    - On connect: full snapshot as a JSON array of `OrderDto`
    - On each state change: single `OrderDto` pushed to all connected clients
    - Client messages are silently ignored (read-only)
  version: "1.0.0"

servers:
  - url: http://localhost:8081
    description: Query server (REST snapshots + WebSocket live push)

tags:
  - name: orders
    description: Order state queries

paths:
  /orders:
    get:
      tags: [orders]
      summary: Get all orders (snapshot)
      operationId: getAllOrders
      responses:
        '200':
          description: Array of all orders currently held in the ViewServerReadModel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'

  /orders/{orderId}:
    get:
      tags: [orders]
      summary: Get a single order by ID
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1001
      responses:
        '200':
          description: The matching order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: orderId is not a valid integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{accountId}/orders:
    get:
      tags: [orders]
      summary: Get all orders for an account
      operationId: getAccountOrders
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        '200':
          description: Orders filtered by accountId (empty array if none)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'
        '400':
          description: accountId is not a valid integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    OrderDto:
      type: object
      description: Snapshot of an order as projected by ViewServerReadModel
      properties:
        orderId:
          type: integer
          format: int64
          example: 1001
        accountId:
          type: integer
          format: int64
          example: 42
        instrument:
          type: string
          example: "AAPL"
        side:
          type: string
          enum: [BUY, SELL]
        orderType:
          type: string
          enum: [LIMIT, MARKET]
        tif:
          type: string
          enum: [DAY, GTC, IOC, FOK]
        price:
          type: number
          format: double
          description: Fixed-point value ÷ 10^8
          example: 150.25
        quantity:
          type: number
          format: double
          example: 100.0
        status:
          type: string
          enum: [OPEN, FILLED, PARTIALLY_FILLED, CANCELLED, REJECTED]
        lastFillPrice:
          type: number
          format: double
          example: 150.25
        lastFillQty:
          type: number
          format: double
          example: 50.0
        cumulativeFilledQty:
          type: number
          format: double
          example: 50.0
        remainingQty:
          type: number
          format: double
          example: 50.0

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "not found"